<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - SPORTFLEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="toast"
        class="fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-2xl transform transition-transform duration-300 translate-x-full z-50 flex items-center gap-3">
        <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
        <span id="toast-message" class="font-medium text-sm"></span>
    </div>

    <div class="w-full bg-white border-b border-gray-100 mb-6 shadow-sm">
        <header class="py-4 px-4 md:px-8 max-w-7xl mx-auto flex justify-between items-center">
            <a href="Home.html"
                class="flex items-center gap-2 text-2xl font-black text-blue-600 italic tracking-tighter">
                <i data-lucide="activity" class="text-3xl"></i> SPORTFLEX
            </a>
        </header>
    </div>

    <main class="max-w-7xl mx-auto px-4 md:px-8 pb-12">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl md:text-3xl font-black uppercase text-gray-800">THANH TOÁN</h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-black text-gray-800 uppercase flex items-center gap-2">
                            <i data-lucide="map-pin" class="text-blue-600"></i> Địa chỉ nhận hàng
                        </h2>
                        <button onclick="openManageAddressModal()"
                            class="text-blue-600 text-sm font-bold hover:underline">Thay đổi</button>
                    </div>

                    <div id="current-address-display" class="p-4 border-2 border-blue-100 bg-blue-50/30 rounded-xl">
                        <p class="font-bold text-gray-900" id="addr-name-phone">Đang tải...</p>
                        <p class="text-sm text-gray-600 mt-1" id="addr-full">Vui lòng thêm địa chỉ giao hàng</p>
                    </div>
                    <input type="hidden" id="selected-address-id">
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-bold uppercase mb-4 flex items-center gap-2">
                        <i data-lucide="clipboard-edit" class="text-blue-600"></i> GHI CHÚ ĐƠN HÀNG
                    </h2>
                    <textarea id="order-note" rows="3" class="w-full border border-gray-200 rounded-xl p-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Ghi chú thêm cho người giao hàng (ví dụ: Giao giờ hành chính, gọi trước khi giao...)"></textarea>
                </div>
                <div id="modal-manage-address"
                    class="fixed inset-0 z-50 bg-black/50 hidden flex items-center justify-center backdrop-blur-sm">
                    <div class="bg-white w-full max-w-xl rounded-2xl p-6 shadow-2xl mx-4">
                        <div class="flex justify-between items-center border-b pb-4 mb-4">
                            <h3 class="font-black text-gray-800">ĐỊA CHỈ CỦA TÔI</h3>
                            <button onclick="closeManageAddressModal()"><i data-lucide="x"
                                    class="w-6 h-6 text-gray-400"></i></button>
                        </div>

                        <div id="address-list-radio" class="space-y-4 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                        </div>

                        <div class="mt-6 flex flex-col gap-3">
                            <button onclick="openAddAddressModal()"
                                class="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-bold hover:bg-gray-50 transition flex items-center justify-center gap-2">
                                <i data-lucide="plus-circle" class="w-5 h-5"></i> Thêm địa chỉ mới
                            </button>
                            <button onclick="confirmSelectAddress()"
                                class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition">Xác
                                nhận</button>
                        </div>
                    </div>
                </div>

                <div id="modal-add-address"
                    class="fixed inset-0 z-[60] bg-black/50 hidden flex items-center justify-center">
                    <div class="bg-white w-full max-w-lg rounded-2xl p-6 mx-4">
                        <h3 class="font-black text-gray-800 mb-6 uppercase">Thêm địa chỉ mới</h3>
                        <form id="form-new-address" onsubmit="saveNewAddress(event)" class="space-y-4">
                            <input type="text" id="m-name" placeholder="Họ và tên" required
                                class="w-full border rounded-xl p-3 text-sm outline-none focus:border-blue-600">
                            <input type="tel" id="m-phone" placeholder="Số điện thoại" required
                                class="w-full border rounded-xl p-3 text-sm outline-none focus:border-blue-600">
                            <div class="grid grid-cols-3 gap-2">
                                <select id="m-prov" class="border rounded-xl p-2 text-xs outline-none">
                                    <option value="">Tỉnh</option>
                                </select>
                                <select id="m-dist" class="border rounded-xl p-2 text-xs outline-none">
                                    <option value="">Huyện</option>
                                </select>
                                <select id="m-ward" class="border rounded-xl p-2 text-xs outline-none">
                                    <option value="">Xã</option>
                                </select>
                            </div>
                            <input type="text" id="m-detail" placeholder="Số nhà, tên đường..." required
                                class="w-full border rounded-xl p-3 text-sm outline-none focus:border-blue-600">
                            <div class="flex gap-2">
                                <button type="button" onclick="closeAddAddressModal()"
                                    class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">Hủy</button>
                                <button type="submit" id="btn-save-address"
                                    class="flex-1 py-3 bg-gray-900 text-white rounded-xl font-bold">Lưu địa chỉ</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex items-center mb-6 pb-4 border-b border-gray-100">
                        <div
                            class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold flex items-center justify-center mr-3">
                            2</div>
                        <h2 class="text-lg md:text-xl font-bold uppercase text-gray-800">PHƯƠNG THỨC THANH TOÁN</h2>
                    </div>

                    <div class="space-y-4">
                        <label
                            class="flex items-center p-4 border-2 border-blue-600 rounded-xl cursor-pointer bg-blue-50/50">
                            <input type="radio" name="payment_method" value="COD" class="w-5 h-5 accent-blue-600"
                                checked>
                            <div class="ml-4 flex-1">
                                <div class="font-bold text-gray-800 text-sm md:text-base">Thanh toán khi nhận hàng (COD)
                                </div>
                                <p class="text-xs md:text-sm text-gray-500 mt-1">Thanh toán bằng tiền mặt khi nhận hàng.
                                </p>
                            </div>
                        </label>

                        <label
                            class="flex items-center p-4 border border-gray-200 rounded-xl cursor-pointer hover:border-blue-300 transition">
                            <input type="radio" name="payment_method" value="VNPAY" class="w-5 h-5 accent-blue-600">
                            <div class="ml-4 flex-1">
                                <div class="font-bold text-gray-800 flex items-center gap-2 text-sm md:text-base">
                                    Thanh toán qua VNPAY
                                    <span
                                        class="text-blue-600 font-bold italic border border-blue-200 bg-white px-2 py-0.5 rounded text-[10px]">VNPAY</span>
                                </div>
                                <p class="text-xs md:text-sm text-gray-500 mt-1">Thanh toán qua ví điện tử hoặc thẻ
                                    ATM/Visa.</p>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-4">
                    <h2 class="text-lg font-bold uppercase mb-4 border-b border-gray-100 pb-4 flex items-center gap-2">
                        <i data-lucide="receipt" class="text-blue-600"></i> TÓM TẮT ĐƠN HÀNG
                    </h2>

                    <div id="checkout-items" class="max-h-64 overflow-y-auto pr-2 mb-4 space-y-4">
                        <p class="text-center text-sm text-gray-500">Đang tải...</p>
                    </div>

                    <div class="space-y-3 text-sm text-gray-600 mb-6 border-t pt-4 border-gray-100">
                        <div class="flex justify-between">
                            <span>Tạm tính (<span id="checkout-count">0</span> SP)</span>
                            <span class="font-bold text-gray-800" id="checkout-subtotal">0 ₫</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Phí vận chuyển</span>
                            <span class="font-bold text-green-600">Miễn phí</span>
                        </div>
                    </div>

                    <div
                        class="flex justify-between items-center mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <span class="font-bold text-gray-800">Tổng thanh toán</span>
                        <span class="text-xl md:text-2xl font-black text-blue-600" id="checkout-total">0 ₫</span>
                    </div>

                    <button onclick="handlePlaceOrder(event)" id="btn-submit"
                        class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-lg">
                        Xác nhận đặt hàng
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        //  FORMAT TIỀN
        function formatMoney(amount) {
            return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " ₫";
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toast.className = `fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-2xl transform transition-transform duration-300 z-50 flex items-center gap-3 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toastMsg.innerText = message;
            toast.classList.remove('translate-x-full');
            setTimeout(() => toast.classList.add('translate-x-full'), 3000);
        }

        //  LOAD GIỎ HÀNG VÀ ĐIỀN THÔNG TIN USER
        let isBuyNowMode = false;
        let buyNowDataPayload = null;
        async function loadCheckoutData() {
            const token = localStorage.getItem('token');
            const userInfo = JSON.parse(localStorage.getItem('userInfo'));
            if (!token) { window.location.href = 'auth.html'; return; }
            // if (userInfo) { document.getElementById('checkout-name').value = userInfo.hoTen || ''; }

            // Kiểm tra xem có đang ở chế độ MUA NGAY không
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'buynow') {
                isBuyNowMode = true;
                buyNowDataPayload = JSON.parse(sessionStorage.getItem('buyNowItem'));

                if (!buyNowDataPayload) { window.location.href = 'index.html'; return; }

                // Đổ duy nhất 1 sản phẩm này ra giao diện
                const container = document.getElementById('checkout-items');
                const total = buyNowDataPayload.giaBan * buyNowDataPayload.soLuong;

                container.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="relative flex-shrink-0">
                            <img src="${buyNowDataPayload.hinhAnh}" class="w-14 h-14 object-contain bg-gray-100 rounded border border-gray-200 p-1">
                            <span class="absolute -top-2 -right-2 bg-gray-700 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">${buyNowDataPayload.soLuong}</span>
                        </div>
                        <div>
                            <h4 class="font-bold text-xs text-gray-800 line-clamp-2 leading-tight mb-1">${buyNowDataPayload.tenSanPham}</h4>
                            <div class="flex gap-2 items-center text-[11px]">
                                <span class="text-gray-500">Size: ${buyNowDataPayload.kichCo}</span>
                                <span class="font-bold text-blue-600">${formatMoney(buyNowDataPayload.giaBan)}</span>
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('checkout-count').innerText = buyNowDataPayload.soLuong;
                document.getElementById('checkout-subtotal').innerText = formatMoney(total);
                document.getElementById('checkout-total').innerText = formatMoney(total);
                return; // Dừng hàm tại đây, không gọi API giỏ hàng nữa
            }
            try {
                // Gọi API lấy giỏ hàng
                const response = await fetch('http://localhost:3000/api/cart', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (response.ok && result.data.length > 0) {
                    const container = document.getElementById('checkout-items');
                    container.innerHTML = '';
                    let total = 0;
                    let count = 0;

                    result.data.forEach(item => {
                        const price = item.GiaBan || 0;
                        total += price * item.SoLuong;
                        count += item.SoLuong;

                        container.innerHTML += `
                            <div class="flex items-start gap-3">
                                <div class="relative flex-shrink-0">
                                    <img src="../assets/images/${item.HinhAnhChinh}" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=100'" class="w-14 h-14 object-contain bg-gray-100 rounded border border-gray-200 p-1">
                                    <span class="absolute -top-2 -right-2 bg-gray-700 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">${item.SoLuong}</span>
                                </div>
                                <div>
                                    <h4 class="font-bold text-xs text-gray-800 line-clamp-2 leading-tight mb-1">${item.TenSanPham}</h4>
                                    <div class="flex gap-2 items-center text-[11px]">
                                        <span class="text-gray-500">Size: ${item.KichCo}</span>
                                        <span class="font-bold text-blue-600">${formatMoney(price)}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('checkout-count').innerText = count;
                    document.getElementById('checkout-subtotal').innerText = formatMoney(total);
                    document.getElementById('checkout-total').innerText = formatMoney(total);
                } else {
                    window.location.href = 'cart.html'; // Giỏ rỗng thì đá về trang Giỏ hàng
                }
            } catch (error) {
                console.error("Lỗi tải giỏ hàng:", error);
            }
        }
        let allAddresses = [];
        async function loadUserAddresses() {
            const token = localStorage.getItem('token');
            const response = await fetch('http://localhost:3000/api/user/addresses', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await response.json();
            allAddresses = result.data || [];

            const radioContainer = document.getElementById('address-list-radio');
            radioContainer.innerHTML = '';

            if (allAddresses.length > 0) {
                allAddresses.forEach(addr => {
                    const isDefault = addr.LaMacDinh === 1;
                    // Nếu là địa chỉ mặc định thì tự động hiển thị ra màn hình chính ngay
                    if (isDefault && !document.getElementById('selected-address-id').value) {
                        updateDisplayAddress(addr);
                    }

                    // Vẽ danh sách Radio trong Modal
                    radioContainer.innerHTML += `
                <label class="flex items-start gap-4 p-4 border rounded-xl cursor-pointer hover:bg-gray-50 transition has-[:checked]:border-blue-600 has-[:checked]:bg-blue-50/30">
                    <input type="radio" name="addr-radio" value="${addr.MaDiaChi}" ${isDefault ? 'checked' : ''} class="mt-1 w-4 h-4 text-blue-600">
                    <div class="flex-grow">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-gray-900 text-sm">${addr.TenNguoiNhan}</span>
                            <span class="text-gray-400 text-xs">|</span>
                            <span class="text-gray-600 text-sm">${addr.SoDienThoaiNhan}</span>
                            ${isDefault ? '<span class="text-[10px] bg-blue-600 text-white px-1.5 py-0.5 rounded uppercase font-bold">Mặc định</span>' : ''}
                        </div>
                        <p class="text-xs text-gray-500 leading-relaxed">${addr.DiaChiChiTiet}</p>
                    </div>
                </label>
            `;
                });
            } else {
                radioContainer.innerHTML = '<p class="text-center text-gray-400 py-4">Chưa có địa chỉ nào.</p>';
                document.getElementById('addr-name-phone').innerText = "Chưa có thông tin";
                document.getElementById('addr-full').innerText = "Bạn vui lòng bấm 'Thay đổi' để thêm địa chỉ giao hàng mới nhé!";
            }
        }

        // Cập nhật hiển thị lên màn hình chính
        function updateDisplayAddress(addr) {
            document.getElementById('selected-address-id').value = addr.MaDiaChi;
            document.getElementById('addr-name-phone').innerText = `${addr.TenNguoiNhan} | ${addr.SoDienThoaiNhan}`;
            document.getElementById('addr-full').innerText = addr.DiaChiChiTiet;
        }

        // Xác nhận chọn từ Radio
        function confirmSelectAddress() {
            const selectedId = document.querySelector('input[name="addr-radio"]:checked').value;
            const addr = allAddresses.find(a => a.MaDiaChi == selectedId);
            if (addr) {
                updateDisplayAddress(addr);
                closeManageAddressModal();
            }
        }

        // Mở/Đóng các Modal
        // function openManageAddressModal() { document.getElementById('modal-manage-address').classList.remove('hidden'); }
        // function closeManageAddressModal() { document.getElementById('modal-manage-address').classList.add('hidden'); }
        // function openAddAddressModal() { document.getElementById('modal-add-address').classList.remove('hidden'); }
        // function closeAddAddressModal() { document.getElementById('modal-add-address').classList.add('hidden'); }

        function openAddressModal() {
            document.getElementById('address-modal').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('address-modal-content').classList.remove('scale-95');
                document.getElementById('address-modal-content').classList.add('scale-100');
            }, 10);
        }

        function closeAddressModal() {
            document.getElementById('address-modal-content').classList.remove('scale-100');
            document.getElementById('address-modal-content').classList.add('scale-95');
            setTimeout(() => { document.getElementById('address-modal').classList.add('hidden'); }, 200);
        }

        // luuw địa chỉ mới
        async function saveNewAddress(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save-address');
            btn.innerHTML = 'Đang lưu...'; btn.disabled = true;

            // Ghép địa chỉ
            const name = document.getElementById('m-name').value;
            const phone = document.getElementById('m-phone').value;
            const address = document.getElementById('m-detail').value;
            const prov = document.getElementById('m-prov').value;
            const dist = document.getElementById('m-dist').value;
            const ward = document.getElementById('m-ward').value;
            const fullAddress = `${address}, ${ward}, ${dist}, ${prov}`;

            const token = localStorage.getItem('token');
            try {
                const response = await fetch('http://localhost:3000/api/user/addresses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        tenNguoiNhan: name,
                        soDienThoai: phone,
                        diaChiChiTiet: fullAddress
                    })
                });

                if (response.ok) {
                    showToast("Đã lưu địa chỉ!");
                    await loadUserAddresses();
                    closeAddAddressModal();
                }
            } catch (error) { showToast("Lỗi kết nối", "error"); }
            btn.innerHTML = 'Lưu địa chỉ'; btn.disabled = false;
        }



        //  API TỈNH THÀNH
        const provinceSelect = document.getElementById('m-prov');
        const districtSelect = document.getElementById('m-dist');
        const wardSelect = document.getElementById('m-ward');

        fetch('https://provinces.open-api.vn/api/p/')
            .then(res => res.json())
            .then(data => data.forEach(p => provinceSelect.add(new Option(p.name, p.name))))

        provinceSelect.addEventListener('change', function () {
            const pName = this.value;
            districtSelect.innerHTML = '<option value="">Chọn Quận/Huyện</option>';
            wardSelect.innerHTML = '<option value="">Chọn Phường/Xã</option>';
            wardSelect.disabled = true;

            if (pName) {
                districtSelect.disabled = false;
                // Tìm code dựa theo tên để fetch Quận/Huyện
                fetch('https://provinces.open-api.vn/api/p/')
                    .then(res => res.json())
                    .then(data => {
                        const pCode = data.find(p => p.name === pName).code;
                        return fetch(`https://provinces.open-api.vn/api/p/${pCode}?depth=2`);
                    })
                    .then(res => res.json())
                    .then(data => data.districts.forEach(d => districtSelect.add(new Option(d.name, d.name))));
            } else { districtSelect.disabled = true; }
        });

        districtSelect.addEventListener('change', function () {
            const dName = this.value;
            wardSelect.innerHTML = '<option value="">Chọn Phường/Xã</option>';
            if (dName) {
                wardSelect.disabled = false;
                // Lấy data phường xã tương tự...
                fetch('https://provinces.open-api.vn/api/d/')
                    .then(res => res.json())
                    .then(data => {
                        const dCode = data.find(d => d.name === dName).code;
                        return fetch(`https://provinces.open-api.vn/api/d/${dCode}?depth=2`);
                    })
                    .then(res => res.json())
                    .then(data => data.wards.forEach(w => wardSelect.add(new Option(w.name, w.name))));
            } else { wardSelect.disabled = true; }
        });

        async function handlePlaceOrder(event) {
            event.preventDefault();
            const token = localStorage.getItem('token');
            if (!token) { alert("Vui lòng đăng nhập!"); window.location.href = "index.html"; return; }

            const maDiaChi = document.getElementById('selected-address-id').value;
            const selectedPaymentRadio = document.querySelector('input[name="payment_method"]:checked');
            const phuongThucThanhToan = selectedPaymentRadio ? selectedPaymentRadio.value : 'COD';
            const ghiChu = document.getElementById('order-note').value.trim();

            if (!maDiaChi) {
                showToast("Vui lòng thêm địa chỉ giao hàng!", "error");
                return;
            }

            // Xử lý chế độ mua ngay
            const buyNowData = JSON.parse(sessionStorage.getItem('buyNowItem'));
            let buyNowItem = null;
            if (isBuyNowMode && buyNowData) {
                buyNowItem = { maBienThe: buyNowData.maBienThe, soLuong: buyNowData.soLuong };
            }

            const orderBtn = document.getElementById('btn-submit');
            orderBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> ĐANG XỬ LÝ...';
            orderBtn.disabled = true;

            try {
                // SỬ DỤNG ĐÚNG API ĐẶT HÀNG TRONG USER ROUTES
                const response = await fetch('http://localhost:3000/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ maDiaChi, phuongThucThanhToan, ghiChu, buyNowItem })
                });

                const result = await response.json();

                if (response.ok) {
                    showToast(" Đặt hàng thành công!");
                    if (buyNowData) sessionStorage.removeItem('buyNowItem'); // Xóa data tạm

                    // Chuyển về trang Lịch sử đơn hàng (profile.html)
                    setTimeout(() => {
                        window.location.href = "profile.html";
                    }, 1500);
                } else {
                    showToast(result.message || "Lỗi đặt hàng", "error");
                    orderBtn.innerHTML = 'Xác nhận đặt hàng'; orderBtn.disabled = false;
                }
            } catch (error) {
                showToast("Lỗi kết nối máy chủ!", "error");
                orderBtn.innerHTML = 'Xác nhận đặt hàng'; orderBtn.disabled = false;
            }
        }

        // Chạy khi load trang
        document.addEventListener('DOMContentLoaded', loadCheckoutData);
        document.addEventListener('DOMContentLoaded', loadUserAddresses);
