<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - SPORTFLEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="toast" class="fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-2xl transform transition-transform duration-300 translate-x-full z-50 flex items-center gap-3">
        <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
        <span id="toast-message" class="font-medium text-sm"></span>
    </div>
    
    <div class="w-full bg-white border-b border-gray-100 mb-6 shadow-sm">
        <header class="py-4 px-4 md:px-8 max-w-7xl mx-auto flex justify-between items-center">
            <a href="Home.html" class="flex items-center gap-2 text-2xl font-black text-blue-600 italic tracking-tighter">
                <i data-lucide="activity" class="text-3xl"></i> SPORTFLEX
            </a>
            <div class="flex items-center gap-4 text-sm font-bold text-gray-600">
                <i data-lucide="lock" class="text-green-600"></i> Thanh toán bảo mật
            </div>
        </header>
    </div>

    <main class="max-w-7xl mx-auto px-4 md:px-8 pb-12">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl md:text-3xl font-black uppercase text-gray-800">THANH TOÁN</h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                
                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex items-center mb-6 pb-4 border-b border-gray-100">
                        <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold flex items-center justify-center mr-3">1</div>
                        <h2 class="text-lg md:text-xl font-bold uppercase text-gray-800">THÔNG TIN NHẬN HÀNG</h2>
                    </div>

                    <form id="checkout-form">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                            <div>
                                <label class="block text-sm font-semibold mb-2 text-gray-700">Họ và tên <span class="text-red-500">*</span></label>
                                <input type="text" id="checkout-name" required placeholder="Nhập họ và tên đầy đủ" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:border-blue-500 outline-none bg-gray-50 focus:bg-white transition text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-2 text-gray-700">Số điện thoại <span class="text-red-500">*</span></label>
                                <input type="tel" id="checkout-phone" required placeholder="Nhập số điện thoại liên hệ" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:border-blue-500 outline-none bg-gray-50 focus:bg-white transition text-sm">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-5">
                            <div>
                                <label class="block text-sm font-semibold mb-2 text-gray-700">Tỉnh / Thành phố <span class="text-red-500">*</span></label>
                                <select id="province" required class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-600 outline-none focus:border-blue-500 bg-gray-50 focus:bg-white">
                                    <option value="">Chọn Tỉnh/Thành</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-2 text-gray-700">Quận / Huyện <span class="text-red-500">*</span></label>
                                <select id="district" required disabled class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-600 outline-none focus:border-blue-500 bg-gray-50 focus:bg-white">
                                    <option value="">Chọn Quận/Huyện</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold mb-2 text-gray-700">Phường / Xã <span class="text-red-500">*</span></label>
                                <select id="ward" required disabled class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm text-gray-600 outline-none focus:border-blue-500 bg-gray-50 focus:bg-white">
                                    <option value="">Chọn Phường/Xã</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label class="block text-sm font-semibold mb-2 text-gray-700">Địa chỉ cụ thể <span class="text-red-500">*</span></label>
                            <input type="text" id="checkout-address" required placeholder="VD: 123 Đường A, Tòa nhà B..." class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 text-sm bg-gray-50">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-2 text-gray-700">Ghi chú (Tùy chọn)</label>
                            <textarea id="checkout-note" rows="2" placeholder="Ghi chú về thời gian giao hàng..." class="w-full border border-gray-300 rounded-lg px-4 py-3 outline-none focus:border-blue-500 text-sm bg-gray-50"></textarea>
                        </div>
                    </form>
                </div>

                <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex items-center mb-6 pb-4 border-b border-gray-100">
                        <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 font-bold flex items-center justify-center mr-3">2</div>
                        <h2 class="text-lg md:text-xl font-bold uppercase text-gray-800">PHƯƠNG THỨC THANH TOÁN</h2>
                    </div>

                    <div class="space-y-4">
                        <label class="flex items-center p-4 border-2 border-blue-600 rounded-xl cursor-pointer bg-blue-50/50">
                            <input type="radio" name="payment_method" value="COD" class="w-5 h-5 accent-blue-600" checked>
                            <div class="ml-4 flex-1">
                                <div class="font-bold text-gray-800 text-sm md:text-base">Thanh toán khi nhận hàng (COD)</div>
                                <p class="text-xs md:text-sm text-gray-500 mt-1">Thanh toán bằng tiền mặt khi nhận hàng.</p>
                            </div>
                        </label>

                        <label class="flex items-center p-4 border border-gray-200 rounded-xl cursor-pointer hover:border-blue-300 transition">
                            <input type="radio" name="payment_method" value="VNPAY" class="w-5 h-5 accent-blue-600">
                            <div class="ml-4 flex-1">
                                <div class="font-bold text-gray-800 flex items-center gap-2 text-sm md:text-base">
                                    Thanh toán qua VNPAY
                                    <span class="text-blue-600 font-bold italic border border-blue-200 bg-white px-2 py-0.5 rounded text-[10px]">VNPAY</span>
                                </div>
                                <p class="text-xs md:text-sm text-gray-500 mt-1">Thanh toán qua ví điện tử hoặc thẻ ATM/Visa.</p>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-4">
                    <h2 class="text-lg font-bold uppercase mb-4 border-b border-gray-100 pb-4 flex items-center gap-2">
                        <i data-lucide="receipt" class="text-blue-600"></i> TÓM TẮT ĐƠN HÀNG
                    </h2>
                    
                    <div id="checkout-items" class="max-h-64 overflow-y-auto pr-2 mb-4 space-y-4">
                        <p class="text-center text-sm text-gray-500">Đang tải...</p>
                    </div>

                    <div class="space-y-3 text-sm text-gray-600 mb-6 border-t pt-4 border-gray-100">
                        <div class="flex justify-between">
                            <span>Tạm tính (<span id="checkout-count">0</span> SP)</span>
                            <span class="font-bold text-gray-800" id="checkout-subtotal">0 ₫</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Phí vận chuyển</span>
                            <span class="font-bold text-green-600">Miễn phí</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <span class="font-bold text-gray-800">Tổng thanh toán</span>
                        <span class="text-xl md:text-2xl font-black text-blue-600" id="checkout-total">0 ₫</span>
                    </div>

                    <button onclick="submitOrder(event)" id="btn-submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition flex items-center justify-center gap-2 shadow-lg">
                        Xác nhận đặt hàng
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        //  FORMAT TIỀN
        function formatMoney(amount) {
            return amount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " ₫";
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toast.className = `fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-2xl transform transition-transform duration-300 z-50 flex items-center gap-3 ${type==='success'?'bg-green-600':'bg-red-600'}`;
            toastMsg.innerText = message;
            toast.classList.remove('translate-x-full');
            setTimeout(() => toast.classList.add('translate-x-full'), 3000);
        }

        //  LOAD GIỎ HÀNG VÀ ĐIỀN THÔNG TIN USER
        async function loadCheckoutData() {
            const token = localStorage.getItem('token');
            const userInfo = JSON.parse(localStorage.getItem('userInfo'));

            if (!token) {
                window.location.href = 'auth.html';
                return;
            }

            // Điền sẵn tên 
            if(userInfo) {
                document.getElementById('checkout-name').value = userInfo.hoTen || '';
            }

            try {
                // Gọi API lấy giỏ hàng
                const response = await fetch('http://localhost:3000/api/cart', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (response.ok && result.data.length > 0) {
                    const container = document.getElementById('checkout-items');
                    container.innerHTML = '';
                    let total = 0;
                    let count = 0;

                    result.data.forEach(item => {
                        const price = item.GiaBan || 0;
                        total += price * item.SoLuong;
                        count += item.SoLuong;

                        container.innerHTML += `
                            <div class="flex items-start gap-3">
                                <div class="relative flex-shrink-0">
                                    <img src="../assets/images/${item.HinhAnhChinh}" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=100'" class="w-14 h-14 object-contain bg-gray-100 rounded border border-gray-200 p-1">
                                    <span class="absolute -top-2 -right-2 bg-gray-700 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">${item.SoLuong}</span>
                                </div>
                                <div>
                                    <h4 class="font-bold text-xs text-gray-800 line-clamp-2 leading-tight mb-1">${item.TenSanPham}</h4>
                                    <div class="flex gap-2 items-center text-[11px]">
                                        <span class="text-gray-500">Size: ${item.KichCo}</span>
                                        <span class="font-bold text-blue-600">${formatMoney(price)}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('checkout-count').innerText = count;
                    document.getElementById('checkout-subtotal').innerText = formatMoney(total);
                    document.getElementById('checkout-total').innerText = formatMoney(total);
                } else {
                    window.location.href = 'cart.html'; // Giỏ rỗng thì đá về trang Giỏ hàng
                }
            } catch (error) {
                console.error("Lỗi tải giỏ hàng:", error);
            }
        }

        //  API TỈNH THÀNH
        const provinceSelect = document.getElementById('province');
        const districtSelect = document.getElementById('district');
        const wardSelect = document.getElementById('ward');

        fetch('https://provinces.open-api.vn/api/p/')
            .then(res => res.json())
            .then(data => data.forEach(p => provinceSelect.add(new Option(p.name, p.name))))

        provinceSelect.addEventListener('change', function () {
            const pName = this.value;
            districtSelect.innerHTML = '<option value="">Chọn Quận/Huyện</option>';
            wardSelect.innerHTML = '<option value="">Chọn Phường/Xã</option>';
            wardSelect.disabled = true;

            if (pName) {
                districtSelect.disabled = false;
                // Tìm code dựa theo tên để fetch Quận/Huyện
                fetch('https://provinces.open-api.vn/api/p/')
                    .then(res => res.json())
                    .then(data => {
                        const pCode = data.find(p => p.name === pName).code;
                        return fetch(`https://provinces.open-api.vn/api/p/${pCode}?depth=2`);
                    })
                    .then(res => res.json())
                    .then(data => data.districts.forEach(d => districtSelect.add(new Option(d.name, d.name))));
            } else { districtSelect.disabled = true; }
        });

        districtSelect.addEventListener('change', function () {
            const dName = this.value;
            wardSelect.innerHTML = '<option value="">Chọn Phường/Xã</option>';
            if (dName) {
                wardSelect.disabled = false;
                // Lấy data phường xã tương tự...
                fetch('https://provinces.open-api.vn/api/d/')
                    .then(res => res.json())
                    .then(data => {
                        const dCode = data.find(d => d.name === dName).code;
                        return fetch(`https://provinces.open-api.vn/api/d/${dCode}?depth=2`);
                    })
                    .then(res => res.json())
                    .then(data => data.wards.forEach(w => wardSelect.add(new Option(w.name, w.name))));
            } else { wardSelect.disabled = true; }
        });

        // XỬ LÝ NÚT ĐẶT HÀNG
        async function submitOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            
            // Lấy dữ liệu Form
            const name = document.getElementById('checkout-name').value;
            const phone = document.getElementById('checkout-phone').value;
            const address = document.getElementById('checkout-address').value;
            const prov = document.getElementById('province').value;
            const dist = document.getElementById('district').value;
            const ward = document.getElementById('ward').value;
            const note = document.getElementById('checkout-note').value;
            
            // Lấy Phương thức thanh toán
            const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;

            // Validate
            if(!name || !phone || !address || !prov || !dist || !ward) {
                showToast("Vui lòng điền đầy đủ thông tin nhận hàng!", "error");
                return;
            }

            const fullAddress = `${address}, ${ward}, ${dist}, ${prov}`;

            btn.disabled = true;
            btn.innerHTML = 'Đang xử lý...';

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('http://localhost:3000/api/orders/checkout', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        tenNguoiNhan: name,
                        soDienThoai: phone,
                        diaChiChiTiet: fullAddress,
                        phuongThucThanhToan: paymentMethod,
                        ghiChu: note
                    })
                });

                const result = await response.json();

                if(response.ok) {
                    showToast("Đặt hàng thành công!", "success");
                    // Chuyển hướng sau khi đặt thành công (Sau này có thể tạo 1 file success.html)
                    setTimeout(() => {
                        alert(`Cảm ơn bạn đã mua hàng! Mã đơn của bạn là: ${result.maTraCuu}`);
                        window.location.href = "profile.html"; // Chuyển về trang Lịch sử mua hàng
                    }, 2000);
                } else {
                    showToast(result.message, "error");
                    btn.disabled = false;
                    btn.innerHTML = 'Xác nhận đặt hàng';
                }
            } catch (error) {
                showToast("Lỗi kết nối Server", "error");
                btn.disabled = false;
            }
        }

        // Chạy khi load trang
        document.addEventListener('DOMContentLoaded', loadCheckoutData);

    </script>
</body>
</html>
