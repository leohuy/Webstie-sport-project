<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - SPORTFLEX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <div id="toast"
        class="fixed top-4 right-4 text-white px-6 py-3 rounded-lg shadow-2xl transform transition-transform duration-300 translate-x-full z-50 flex items-center gap-3">
        <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
        <span id="toast-message" class="font-medium text-sm"></span>
    </div>

    <header class="bg-white sticky top-0 z-40 shadow-sm border-b border-gray-100">
        <div class="container mx-auto px-4 lg:px-8 py-4 flex items-center justify-between">
            <a href="Home.html" class="flex items-center gap-2 text-blue-700 hover:text-blue-800 transition">
                <i data-lucide="activity" class="w-8 h-8 md:w-10 md:h-10"></i>
                <span class="text-xl md:text-2xl font-black italic tracking-wider">SPORTFLEX</span>
            </a>

            <div class="flex space-x-2 md:space-x-4 items-center">
                <a href="profile.html"
                    class="hidden md:flex items-center gap-2 border-r border-gray-200 pr-4 cursor-pointer hover:bg-gray-50 p-1 rounded transition">
                    <img src="" id="header-avatar" class="w-8 h-8 rounded-full border border-gray-200">
                    <span class="text-sm font-bold text-gray-700" id="header-name">User</span>
                </a>
                <button
                    class="p-2 text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-full transition relative group">
                    <i data-lucide="shopping-bag" class="w-6 h-6 md:w-7 md:h-7 text-blue-600"></i>
                    <span
                        class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold rounded-full w-4 h-4 md:w-5 md:h-5 flex items-center justify-center border-2 border-white group-hover:scale-110 transition"
                        id="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 lg:px-8 py-6 max-w-7xl mb-12">
        <div class="mb-8 flex items-center justify-between">
            <h1 class="text-2xl md:text-3xl font-black text-gray-900 uppercase">Giỏ Hàng Của Bạn</h1>
            <a href="Home.html"
                class="text-blue-600 font-medium hover:underline flex items-center gap-1 text-sm md:text-base">
                Tiếp tục mua sắm <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </a>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-2/3 flex flex-col gap-4">

                <div id="cart-items-container" class="flex flex-col gap-4">
                    <p class="text-center text-gray-500 py-10" id="loading-text">Đang tải giỏ hàng...</p>
                </div>

                <div id="empty-cart"
                    class="hidden flex-col items-center justify-center py-16 bg-white border border-gray-100 rounded-2xl shadow-sm">
                    <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-4 text-gray-400">
                        <i data-lucide="shopping-cart" class="w-10 h-10"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">Giỏ hàng của bạn đang trống</h3>
                    <p class="text-gray-500 mb-6">Có vẻ như bạn chưa chọn mua sản phẩm nào.</p>
                    <a href="Home.html"
                        class="bg-blue-600 text-white font-bold py-3 px-8 rounded-full hover:bg-blue-700 transition shadow-md">Bắt
                        đầu mua sắm</a>
                </div>
            </div>

            <div class="w-full lg:w-1/3">
                <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm sticky top-24">
                    <h2 class="text-xl font-black text-gray-900 mb-6 uppercase border-b border-gray-100 pb-4">Tóm tắt
                        đơn hàng</h2>

                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between text-gray-600">
                            <span>Tạm tính (<span id="total-items">0</span> sản phẩm)</span>
                            <span class="font-medium text-gray-900" id="subtotal">0 ₫</span>
                        </div>
                        <div class="flex justify-between text-gray-600">
                            <span>Phí vận chuyển</span>
                            <span class="font-medium text-green-600">Miễn phí</span>
                        </div>
                    </div>

                    <div class="border-t border-gray-100 pt-4 mb-8">
                        <div class="flex justify-between items-end">
                            <span class="text-lg font-bold text-gray-900">Tổng cộng</span>
                            <div class="text-right">
                                <span class="text-2xl font-black text-blue-700 block" id="total-price">0 ₫</span>
                            </div>
                        </div>
                    </div>

                    <a href="payment.html" id="btn-checkout"
                        class="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-xl hover:bg-blue-700 transition shadow-lg flex items-center justify-center gap-2 group pointer-events-none opacity-50">
                        Tiến hành thanh toán
                        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </a>
                </div>
            </div>
        </div>
    </main> 
    <script src="../Js/main.js"></script>
    <script src="../Js/api.js"></script>
    <script src="../Js/cart.js"></script>
    
</body>

</html>
