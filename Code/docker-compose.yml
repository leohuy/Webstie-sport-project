version: '3.8'

services:
  # 1. Cấu hình Database MySQL
  mysql-db:
    image: mysql:8.0
    container_name: sportflex_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword   # Mật khẩu root
      MYSQL_DATABASE: sportflex_db        # Tự động tạo DB tên này
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. Cấu hình Backend API
  backend-api:
    build: ./backend
    container_name: sportflex_backend
    restart: always   
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql-db                  # Chỉ thẳng tên container DB
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=sportflex_db
    depends_on:
      - mysql-db

  # 3. Cấu hình Frontend
  frontend-web:
    build: ./frontend
    container_name: sportflex_frontend
    ports:
      - "3000:80"                         # Chạy web ở port 3000
    depends_on:
      - backend-api

volumes:
  db_data:                                # Lưu trữ dữ liệu DB không bị mất khi tắt Docker